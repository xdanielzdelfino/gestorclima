name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      db:
        image: mariadb:10.4
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
          MARIADB_DATABASE: gestorclima_db
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, gd, pdo_mysql

      - name: Install Composer deps
        run: composer install --no-progress --prefer-dist

      - name: Wait for database
        run: |
          for i in {1..30}; do
            if mysql -h mysql -u root -e 'select 1' >/dev/null 2>&1; then
              echo "MySQL reachable" && break
            fi
            echo "Waiting for mysql..."; sleep 2
          done

      - name: Configure DB host for CI
        run: |
          # Ajusta 'DB_HOST' para apontar ao service name 'mysql' em CI
          php -r "file_put_contents('config/config.php', str_replace("DB_HOST', 'localhost'","DB_HOST', 'mysql'", file_get_contents('config/config.php')));

      - name: Lint PHP files
        run: |
          find . -type f -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l || true

      - name: Apply seed
        run: php database/seeds/run_seed.php

      - name: Sanity DB check
        run: php -r "require 'config/config.php'; require 'config/Database.php'; try { echo json_encode(Database::getInstance()->fetchOne('SELECT COUNT(*) as c FROM clientes')); } catch (Exception $e) { echo 'DB_FAIL:'.$e->getMessage(); exit(1);}"

      - name: Run basic smoke script
        run: php -r "echo 'CI OK';"
