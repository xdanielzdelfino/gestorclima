name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Lint PHP files
        run: |
          find . -type f -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l || true

      - name: Deploy to cPanel (rsync over SSH)
        uses: easingthemes/ssh-deploy@v2.1.6
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}
          remote-user: ${{ secrets.CPANEL_USER }}
          server-ip: ${{ secrets.CPANEL_HOST }}
          remote-path: ${{ secrets.CPANEL_TARGET }}
          local-path: .
          excludes: |
            .git
            .github
            vendor
            node_modules
            database/seeds
